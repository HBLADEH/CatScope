name: macOS Preview Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.6.3-preview"
        required: true
        default: "v0.6.3-preview"
      create_release:
        description: "Create or update a draft prerelease"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*-preview"

permissions:
  contents: write

jobs:
  build-macos-universal:
    name: Build macOS universal DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "RELEASE_TAG=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build DMG
        run: scripts/build-macos.sh "$RELEASE_TAG"

      - name: Verify artifacts
        shell: bash
        run: |
          lipo -archs build/bin/CatScope.app/Contents/MacOS/CatScope
          cd dist
          shasum -a 256 -c "CatScope-${RELEASE_TAG}-macos-universal.dmg.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: "CatScope-${{ env.RELEASE_TAG }}-macos-universal"
          path: |
            dist/CatScope-${{ env.RELEASE_TAG }}-macos-universal.dmg
            dist/CatScope-${{ env.RELEASE_TAG }}-macos-universal.dmg.sha256
          if-no-files-found: error

      - name: Create or update draft prerelease
        if: github.event_name == 'push' || inputs.create_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "dist/CatScope-${RELEASE_TAG}-macos-universal.dmg" \
              "dist/CatScope-${RELEASE_TAG}-macos-universal.dmg.sha256" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "dist/CatScope-${RELEASE_TAG}-macos-universal.dmg" \
              "dist/CatScope-${RELEASE_TAG}-macos-universal.dmg.sha256" \
              --draft \
              --prerelease \
              --title "CatScope ${RELEASE_TAG}" \
              --notes-file "docs/releases/${RELEASE_TAG}.md"
          fi
